# ========================================
# Render — OpenClaw (отдельный сервис)
# ========================================
# Deploy OpenClaw на Render.
# New → Blueprint → подключи репо.
# ========================================
# Образ: ghcr.io/openclaw/openclaw:latest
# Документация: https://docs.openclaw.ai/install/docker
# ========================================

services:
  - type: web
    name: openclaw
    runtime: image
    plan: starter

    # Официальный образ OpenClaw
    image:
      url: ghcr.io/openclaw/openclaw:latest

    healthCheckPath: /healthz

    envVars:
      - key: PORT
        value: "18789"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
